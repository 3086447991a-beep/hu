<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致最特别的你</title>
    <!-- 使用 Tailwind CSS 进行快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden; /* 防止移动端滚动 */
            background: linear-gradient(135deg, #ffe6fa 0%, #ffd3e1 100%);
            touch-action: manipulation;
        }

        .title-font {
            font-family: 'Ma Shan Zheng', cursive;
        }

        /* 隐藏元素的过渡类 */
        .fade-out {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-out;
        }

        .fade-in {
            opacity: 1 !important;
            pointer-events: auto !important;
            transition: opacity 1s ease-in;
        }

        /* 心跳动画 */
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .heartbeat-btn {
            animation: heartbeat 1.5s infinite ease-in-out;
        }

        /* 漂浮爱心动画 */
        @keyframes floatDown {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .floating-heart {
            position: absolute;
            color: #ff4d85;
            font-size: 1.5rem;
            user-select: none;
            pointer-events: none;
            z-index: 50;
        }

        /* 打字机光标闪烁 */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background-color: #e11d48;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 拒绝按钮的绝对定位 */
        #btn-no {
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 弹窗祝福动画 */
        @keyframes popupBox {
            0% { transform: scale(0.2) translateY(30px) rotate(var(--rot)); opacity: 0; }
            10% { transform: scale(1.1) translateY(0) rotate(var(--rot)); opacity: 1; }
            15% { transform: scale(1) translateY(0) rotate(var(--rot)); opacity: 1; }
            80% { transform: scale(1) translateY(0) rotate(var(--rot)); opacity: 1; }
            100% { transform: scale(0.8) translateY(-20px) rotate(var(--rot)); opacity: 0; }
        }

        .blessing-box {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #fbcfe8; /* 粉色边框 */
            border-radius: 12px;
            padding: 10px 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15), 0 4px 6px rgba(225, 29, 72, 0.1);
            font-weight: bold;
            color: #e11d48;
            pointer-events: none;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .window-controls {
            display: flex;
            gap: 4px;
        }
        .window-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col items-center justify-center relative">

    <!-- 背景音乐 (你可以替换 src 中的链接为你想用的 MP3 链接) -->
    <!-- 注意：为了稳定，这里使用了一个占位，部署时请换成真实的浪漫音乐URL -->
    <audio id="bgm" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3" type="audio/mpeg">
    </audio>

    <!-- 第一幕：信封封面 -->
    <div id="screen-intro" class="absolute inset-0 flex flex-col items-center justify-center z-30 bg-white/30 backdrop-blur-sm transition-opacity duration-1000">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-[85%] border-2 border-pink-200 relative">
            <div class="absolute -top-6 left-1/2 transform -translate-x-1/2 text-5xl text-rose-500">
                💌
            </div>
            <h1 class="title-font text-3xl text-rose-600 mt-4 mb-6">致最特别的你</h1>
            <p class="text-gray-600 mb-8 text-sm">我们的第 30 天，有一封迟到的情书</p>
            <button id="open-btn" class="heartbeat-btn bg-gradient-to-r from-rose-400 to-pink-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-xl transform transition hover:scale-105 active:scale-95">
                点击开启
            </button>
        </div>
    </div>

    <!-- 第二幕：表白文字 -->
    <div id="screen-confession" class="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 opacity-0 pointer-events-none">
        <div class="max-w-md w-full bg-white/60 backdrop-blur-md rounded-3xl p-8 shadow-xl border border-white/50">
            <!-- 替换成你想说的话 -->
            <div id="text-container" class="text-gray-800 text-lg leading-relaxed min-h-[200px] font-medium">
                <span id="typed-text"></span><span class="cursor" id="cursor"></span>
            </div>
            
            <!-- 选项按钮 (默认隐藏，打字结束后显示) -->
            <div id="action-buttons" class="mt-8 flex justify-around items-center opacity-0 pointer-events-none transition-opacity duration-1000 h-16 relative">
                <button id="btn-yes" class="bg-rose-500 text-white font-bold py-3 px-6 rounded-full shadow-md hover:bg-rose-600 active:scale-95 z-10 w-32">
                    一直愿意 💖
                </button>
                <button id="btn-no" class="bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-full shadow-md z-10 w-32">
                    想反悔 🙅‍♂️
                </button>
            </div>
        </div>
    </div>

    <!-- 第三幕：成功画面 -->
    <div id="screen-success" class="absolute inset-0 flex flex-col items-center justify-center z-40 opacity-0 pointer-events-none bg-rose-500/10 backdrop-blur-sm">
        <div class="text-center">
            <!-- 将原来的 emoji 替换为更现代的 SVG 图标 -->
            <div class="mb-6 heartbeat-btn text-rose-500">
                <div class="inline-block p-4 bg-white/40 backdrop-blur-md rounded-full shadow-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-20 h-20">
                        <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.75 3c1.278 0 2.487.47 3.433 1.291C12.422 3.47 13.63 3 14.908 3c3.036 0 5.5 2.322 5.5 5.25 0 3.924-2.438 7.11-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" />
                    </svg>
                </div>
            </div>
            <h1 class="title-font text-5xl text-rose-600 mb-4 text-shadow">太好了！</h1>
            <p class="text-xl text-rose-800 font-bold bg-white/80 py-2 px-6 rounded-full shadow-sm inline-block">
                接下来的每个 30 天，都请多指教 ❤️
            </p>
        </div>
    </div>

    <script>
        // 你想对TA说的话
        const confessionText = `你好小陈，\n\n不知不觉，我们在一起已经 30 天啦！这一个月里，每一天都因为有你而变得格外甜蜜和闪耀。\n\n虽然我们已经牵手，但我一直觉得，还欠你一个正式、充满仪式感的表白。\n\n谢谢你来到我的世界。以后的日子，不管是晴天还是下雨，我都想紧紧牵着你的手。\n\n你愿意，一直做我的女朋友吗？`;
        
        // 元素获取
        const screenIntro = document.getElementById('screen-intro');
        const screenConfession = document.getElementById('screen-confession');
        const screenSuccess = document.getElementById('screen-success');
        const openBtn = document.getElementById('open-btn');
        const typedTextEl = document.getElementById('typed-text');
        const actionButtons = document.getElementById('action-buttons');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const cursor = document.getElementById('cursor');
        const bgm = document.getElementById('bgm');

        // 步骤 1: 点击开启信封
        openBtn.addEventListener('click', () => {
            // 尝试播放音乐 (移动端需要用户交互才能播放)
            bgm.volume = 0.5;
            bgm.play().catch(e => console.log("音频自动播放被拦截"));

            // 切换屏幕
            screenIntro.classList.add('fade-out');
            screenConfession.classList.add('fade-in');

            // 延迟一秒后开始打字效果
            setTimeout(startTypewriter, 800);
        });

        // 步骤 2: 打字机效果
        let charIndex = 0;
        function startTypewriter() {
            if (charIndex < confessionText.length) {
                // 处理换行符
                if (confessionText.charAt(charIndex) === '\n') {
                    typedTextEl.innerHTML += '<br>';
                } else {
                    typedTextEl.innerHTML += confessionText.charAt(charIndex);
                }
                charIndex++;
                // 打字速度 (毫秒) - 整体提速
                let speed = Math.random() * 30 + 20; // 从 50~100ms 缩短到 20~50ms
                if (confessionText.charAt(charIndex - 1) === '。' || confessionText.charAt(charIndex - 1) === '，') {
                    speed = 200; // 标点符号的停顿也从 400ms 缩短到 200ms
                }
                setTimeout(startTypewriter, speed);
            } else {
                // 打字结束，隐藏光标，显示按钮
                cursor.style.display = 'none';
                actionButtons.classList.remove('opacity-0', 'pointer-events-none');
            }
        }

        // 步骤 3: 调皮的拒绝按钮 (移动端 Touch 和 PC 端 Mouseover 均适配)
        const moveNoButton = (e) => {
            e.preventDefault(); // 防止实际点击触发
            
            // 获取容器的边界
            const container = document.getElementById('text-container').parentElement;
            const containerRect = container.getBoundingClientRect();
            const btnRect = btnNo.getBoundingClientRect();

            // 计算安全的移动范围 (不要超出白色卡片外)
            const maxX = containerRect.width - btnRect.width - 40;
            const maxY = 80; // 上下移动范围

            // 生成随机坐标
            const randomX = Math.floor(Math.random() * maxX) - (maxX / 2) + 20;
            const randomY = Math.floor(Math.random() * maxY) - (maxY / 2);

            // 修改文案增加趣味性
            const funnyTexts = ["没门！", "上了贼船还想跑？", "抗议无效", "就不让你点", "乖乖从了我吧"];
            btnNo.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];

            // 应用新位置
            btnNo.style.transform = `translate(${randomX}px, ${randomY}px)`;
        };

        // 监听触摸和悬停事件
        btnNo.addEventListener('touchstart', moveNoButton, {passive: false});
        btnNo.addEventListener('mouseover', moveNoButton);

        // 步骤 4: 点击同意
        btnYes.addEventListener('click', () => {
            screenConfession.classList.remove('fade-in');
            screenConfession.classList.add('fade-out');
            
            setTimeout(() => {
                screenSuccess.classList.add('fade-in');
                startHeartRain();
                startBlessingPopups(); // 开启满屏弹字特效
            }, 500);
        });

        // 抖音同款满屏祝福文字
        function startBlessingPopups() {
            const blessings = [
                "天天开心! ✨", "永远爱你~ ❤️", "平安喜乐 🍎", "万事胜意 🌟",
                "越来越美! 💃", "甜甜蜜蜜 🍬", "心想事成 🌠", "好运连连 🍀",
                "满眼是你 😍", "早日暴富 💰", "每天开心 😄", "小陈最棒! 👑",
                "只宠你一人 🐶", "永远的宝贝 🎁", "无忧无虑 🎈", "被爱包围 🥰",
                "乖乖听话 😽", "带你吃好吃的 🍲"
            ];

            setInterval(() => {
                const box = document.createElement('div');
                box.classList.add('blessing-box');
                
                // 添加类似电脑窗口的三个小圆点
                const controls = document.createElement('div');
                controls.classList.add('window-controls');
                ['#ff5f56', '#ffbd2e', '#27c93f'].forEach(color => {
                    const dot = document.createElement('div');
                    dot.classList.add('window-dot');
                    dot.style.backgroundColor = color;
                    controls.appendChild(dot);
                });
                
                // 祝福文本
                const textSpan = document.createElement('span');
                textSpan.innerText = blessings[Math.floor(Math.random() * blessings.length)];
                
                box.appendChild(controls);
                box.appendChild(textSpan);

                // 随机位置 (限制在可见区域内)
                box.style.left = Math.random() * 65 + 5 + 'vw'; 
                box.style.top = Math.random() * 75 + 5 + 'vh';
                
                // 设置随机旋转角度变量供 CSS 使用 (-15度到15度)
                box.style.setProperty('--rot', `${Math.random() * 30 - 15}deg`);
                
                // 随机动画时长
                const duration = Math.random() * 1.5 + 2.5; // 2.5s 到 4s
                box.style.animation = `popupBox ${duration}s ease-in-out forwards`;
                
                document.body.appendChild(box);

                // 动画结束后移除元素，防止页面卡顿
                setTimeout(() => {
                    box.remove();
                }, duration * 1000);
            }, 120); // 时间间隔从 350ms 缩短到 120ms，弹窗密度翻倍！
        }

        // 生成爱心雨的函数
        function startHeartRain() {
            const hearts = ['❤️', '💖', '💗', '💓', '💕'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                
                // 随机起始位置和大小
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                
                // 随机动画时长
                const duration = Math.random() * 3 + 3;
                heart.style.animation = `floatDown ${duration}s linear forwards`;
                
                document.body.appendChild(heart);

                // 动画结束后移除元素
                setTimeout(() => {
                    heart.remove();
                }, duration * 1000);
            }, 300); // 每 300ms 生成一个爱心
        }
    </script>
</body>
</html>
