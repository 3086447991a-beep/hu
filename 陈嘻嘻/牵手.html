<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小陈的专属手账</title>
    <!-- 使用 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入可爱的手写字体 */
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap');

        body {
            /* 可爱的网格手账本背景 */
            background-color: #fdfbfb;
            background-image: 
                linear-gradient(#f0e4e6 1.5px, transparent 1.5px),
                linear-gradient(90deg, #f0e4e6 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            font-family: 'Ma Shan Zheng', cursive;
            overflow: hidden;
            touch-action: manipulation;
            color: #4a4a4a;
        }

        /* 隐藏元素的过渡类 */
        .fade-out {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
        }

        .fade-in {
            opacity: 1 !important;
            pointer-events: auto !important;
            transition: opacity 0.8s ease-in;
        }

        /* 封面跳动动画 */
        @keyframes bounce-soft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .bouncing-cover {
            animation: bounce-soft 2s infinite ease-in-out;
        }

        /* 手账本纸张质感与阴影 */
        .scrapbook-page {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 
                3px 3px 0px #ffd1dc,
                6px 6px 0px #bde0fe,
                0 15px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 纸胶带效果 */
        .washi-tape {
            position: absolute;
            width: 100px;
            height: 25px;
            background-color: rgba(255, 182, 193, 0.6); /* 半透明粉色 */
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .tape-1 {
            top: -10px;
            left: -20px;
            transform: rotate(-15deg);
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 182, 193, 0.6),
                rgba(255, 182, 193, 0.6) 10px,
                rgba(255, 209, 220, 0.6) 10px,
                rgba(255, 209, 220, 0.6) 20px
            );
        }
        .tape-2 {
            bottom: -10px;
            right: -20px;
            transform: rotate(-10deg);
            background-color: rgba(189, 224, 254, 0.7); /* 柔和蓝色 */
        }

        /* 打字机光标闪烁 */
        .cursor {
            display: inline-block;
            width: 4px;
            height: 1.2em;
            background-color: #ffb3c6;
            vertical-align: middle;
            animation: blink 0.8s infinite;
            border-radius: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 点击屏幕掉落的贴纸/蝴蝶结特效 */
        .sticker {
            position: absolute;
            user-select: none;
            pointer-events: none;
            z-index: 50;
            font-size: 2rem;
            transform-origin: center;
        }
        @keyframes popAndFall {
            0% { transform: scale(0) rotate(0deg); opacity: 1; margin-top: 0; }
            20% { transform: scale(1.2) rotate(-15deg); margin-top: -20px; }
            100% { transform: scale(1) rotate(45deg); opacity: 0; margin-top: 150px; }
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col items-center justify-center relative">

    <!-- 俏皮的提示音 (泡泡声) -->
    <audio id="pop-sound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-soap-bubble-sound-2925.mp3" type="audio/mpeg">
    </audio>

    <!-- 背景轻快音乐 -->
    <audio id="bgm" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-funny-quirky-comedy-track-43.mp3" type="audio/mpeg">
    </audio>

    <!-- 第一幕：手账本封面 -->
    <div id="screen-intro" class="absolute inset-0 flex flex-col items-center justify-center z-30 bg-white/40 backdrop-blur-sm transition-opacity duration-700">
        <div class="bouncing-cover flex flex-col items-center cursor-pointer" id="open-btn">
            <div class="text-8xl mb-4 drop-shadow-lg">📔</div>
            <div class="bg-pink-100 text-pink-600 px-6 py-2 rounded-full border-2 border-pink-300 font-bold text-xl shadow-sm tracking-widest transform -rotate-2">
                点击翻开手账
            </div>
            <p class="mt-4 text-gray-500 text-sm tracking-wider">记录一些开心的小事</p>
        </div>
    </div>

    <!-- 第二幕：手账内页 -->
    <div id="screen-diary" class="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 opacity-0 pointer-events-none">
        
        <!-- 手账纸张 -->
        <div class="scrapbook-page w-full max-w-sm p-8 pb-10 mt-[-5vh]">
            <!-- 纸胶带装饰 -->
            <div class="washi-tape tape-1"></div>
            <div class="washi-tape tape-2"></div>
            
            <!-- 涂鸦小标题 -->
            <div class="text-center mb-6">
                <span class="inline-block bg-yellow-100 text-yellow-700 px-3 py-1 rounded border border-yellow-300 transform rotate-3 text-lg">
                    ✨ 我们的可爱瞬间 ✨
                </span>
            </div>

            <!-- 手写内容区 -->
            <div id="text-container" class="text-gray-700 text-2xl leading-relaxed min-h-[220px]">
                <span id="typed-text"></span><span class="cursor" id="cursor"></span>
            </div>

            <!-- 涂鸦插画装饰 (默认隐藏，打字完显示) -->
            <div id="doodle-deco" class="mt-6 flex justify-between items-end opacity-0 transition-opacity duration-1000">
                <div class="text-4xl transform -rotate-12">🎀</div>
                <div class="text-right text-sm text-gray-400 transform rotate-2">
                    - 记录于某次开心的约会
                </div>
                <div class="text-4xl transform rotate-12">✌️</div>
            </div>
        </div>
        
        <!-- 底部提示 -->
        <p id="hint-text" class="mt-10 text-pink-500 text-lg opacity-0 transition-opacity duration-1000 bg-white/80 px-4 py-1 rounded-full border border-pink-200">
            👆 戳戳屏幕有惊喜 👆
        </p>
    </div>

    <script>
        // 日记本里的话（删除了前面铺垫，直接表达踏实的陪伴感）
        const diaryText = `和你在一起最开心的，就是这些普普通通的瞬间。\n\n不需要多特别的风景，只要有你在身边，哪怕只是拍一张简单的合照，都能让人开心很久。\n\n希望能一直这样，陪你记录下每一个简单快乐的日子，小陈同学。`;
        
        const screenIntro = document.getElementById('screen-intro');
        const screenDiary = document.getElementById('screen-diary');
        const openBtn = document.getElementById('open-btn');
        const typedTextEl = document.getElementById('typed-text');
        const cursor = document.getElementById('cursor');
        const popSound = document.getElementById('pop-sound');
        const bgm = document.getElementById('bgm');
        const doodleDeco = document.getElementById('doodle-deco');
        const hintText = document.getElementById('hint-text');

        let isDiaryOpen = false;

        // 步骤 1: 点击翻开手账
        openBtn.addEventListener('click', () => {
            // 播放可爱的泡泡音效和背景音乐
            popSound.play().catch(e => console.log("音效拦截"));
            bgm.volume = 0.3;
            bgm.play().catch(e => console.log("BGM拦截"));

            // 切换界面
            screenIntro.classList.add('fade-out');
            screenDiary.classList.add('fade-in');

            // 延迟一点开始像写字一样出字
            setTimeout(startTypewriter, 600);
        });

        // 步骤 2: 涂鸦手写效果
        let charIndex = 0;
        function startTypewriter() {
            if (charIndex < diaryText.length) {
                if (diaryText.charAt(charIndex) === '\n') {
                    typedTextEl.innerHTML += '<br>';
                } else {
                    typedTextEl.innerHTML += diaryText.charAt(charIndex);
                }
                charIndex++;
                
                // 打字速度 (模仿手写速度)
                let speed = Math.random() * 60 + 40; 
                if (diaryText.charAt(charIndex - 1) === '。' || diaryText.charAt(charIndex - 1) === '！' || diaryText.charAt(charIndex - 1) === '\n') {
                    speed = 300; // 句子结束停顿久一点
                }
                setTimeout(startTypewriter, speed);
            } else {
                // 写完字后
                cursor.style.display = 'none';
                doodleDeco.classList.remove('opacity-0');
                hintText.classList.remove('opacity-0');
                isDiaryOpen = true;
            }
        }

        // 步骤 3: 屏幕互动 - 疯狂掉落贴纸（蝴蝶结、爱心）
        document.body.addEventListener('click', (e) => {
            // 只有手账打开后才能触发
            if (!isDiaryOpen) return;

            // 每次点击随机生成 1-3 个可爱的元素
            const stickerIcons = ['🎀', '💗', '✨', '✌️', '🌸'];
            const count = Math.floor(Math.random() * 3) + 1;

            for(let i=0; i<count; i++) {
                const sticker = document.createElement('div');
                sticker.classList.add('sticker');
                sticker.innerText = stickerIcons[Math.floor(Math.random() * stickerIcons.length)];
                
                // 出现的位置在点击位置附近随机偏移
                const offsetX = (Math.random() - 0.5) * 60;
                const offsetY = (Math.random() - 0.5) * 60;
                sticker.style.left = `${e.clientX + offsetX - 15}px`; 
                sticker.style.top = `${e.clientY + offsetY - 15}px`;

                // 随机动画时间
                const duration = Math.random() * 0.8 + 0.6;
                sticker.style.animation = `popAndFall ${duration}s ease-in forwards`;
                
                document.body.appendChild(sticker);

                // 顺便播放一下泡泡音效 (重置播放进度以支持连续点击)
                popSound.currentTime = 0;
                popSound.play().catch(()=>{});

                setTimeout(() => {
                    sticker.remove();
                }, duration * 1000);
            }
        });
    </script>
</body>
</html>
