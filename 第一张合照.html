<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>初次合照纪念</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入优雅的明朝体和手写体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Zhi+Mang+Xing&display=swap');

        body {
            /* 默认暗色背景，代表未冲洗的底片 */
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 1.5s ease;
        }

        /* 当切换到亮色模式（照片显影后） */
        body.light-mode {
            background: #f4f1ea; /* 复古纸张颜色 */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            color: #2c2c2c;
        }

        .handwrite {
            font-family: 'Zhi Mang Xing', cursive;
        }

        /* 呼吸灯效果 */
        @keyframes breathe {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .breathe-btn {
            animation: breathe 2.5s infinite ease-in-out;
        }

        /* 相机闪光灯特效 */
        #flash {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: white;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }
        .trigger-flash {
            animation: cameraFlash 1.2s ease-out forwards;
        }
        @keyframes cameraFlash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 文字逐句渐显动画 */
        .fade-text {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }
        .fade-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 结尾的星光/萤火虫特效 */
        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }

        /* 拍立得照片背面的质感卡片 */
        .photo-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,0.5);
            border-radius: 4px;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col items-center justify-center relative">

    <div id="flash"></div>

    <audio id="shutter-sound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-camera-shutter-click-1133.mp3" type="audio/mpeg">
    </audio>

    <audio id="bgm" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3" type="audio/mpeg">
    </audio>

    <div id="screen-intro" class="absolute inset-0 flex flex-col items-center justify-center z-30 transition-opacity duration-1000">
        <div class="text-center flex flex-col items-center">
            <div class="mb-8 text-gray-400 font-light tracking-widest text-sm">
                - MEMORY DETECTED -
            </div>
            
            <button id="develop-btn" class="breathe-btn relative w-24 h-24 rounded-full border-2 border-gray-500 flex items-center justify-center hover:bg-gray-800 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-gray-300">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
                </svg>
            </button>
            
            <p class="mt-8 text-gray-300 font-serif tracking-wider">点击显影，查看照片背面</p>
        </div>
    </div>

    <div id="screen-memory" class="absolute inset-0 flex flex-col items-center justify-center z-20 px-6 opacity-0 pointer-events-none transition-opacity duration-1000">
        <div class="photo-card w-full max-w-sm p-8 pb-12 relative">
            <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-16 h-6 bg-white/40 shadow-sm rotate-[-2deg]"></div>
            
            <div class="text-right mb-6 text-gray-400 font-serif text-sm tracking-widest border-b border-gray-200 pb-2">
                OUR FIRST PHOTO
            </div>

            <div id="memory-text" class="space-y-6 text-gray-700 leading-loose text-lg">
                <p class="fade-text">你好，小陈。</p>
                <p class="fade-text">你现在拿在手里的，<br>是我们的第一张合照。</p>
                <p class="fade-text">照片里的我们，<br>靠得很近，笑得很甜。</p>
                <p class="fade-text">这张照片对我来说意义非凡，<br>所以我想用这种特殊的方式，<br>把它悄悄珍藏起来。</p>
                <p class="fade-text">时间会一直往前走，<br>但这一刻的定格不会变。</p>
                <p class="fade-text">未来的日子里，<br>我们还要一起去很多地方，<br>拍很多很多张照片。</p>
            </div>

            <div class="fade-text text-right mt-10">
                <span class="handwrite text-3xl text-gray-800">只属于我们的纪念</span>
            </div>
        </div>
    </div>

    <script>
        const developBtn = document.getElementById('develop-btn');
        const screenIntro = document.getElementById('screen-intro');
        const screenMemory = document.getElementById('screen-memory');
        const flash = document.getElementById('flash');
        const shutterSound = document.getElementById('shutter-sound');
        const bgm = document.getElementById('bgm');
        const fadeTexts = document.querySelectorAll('.fade-text');

        developBtn.addEventListener('click', () => {
            shutterSound.volume = 0.8;
            shutterSound.play().catch(e => console.log("音效拦截"));
            
            bgm.volume = 0.4;
            bgm.play().catch(e => console.log("BGM拦截"));

            flash.classList.add('trigger-flash');

            setTimeout(() => {
                document.body.classList.add('light-mode');
                screenIntro.style.display = 'none'; 
                screenMemory.classList.remove('opacity-0', 'pointer-events-none');
                
                showTextSequentially();
            }, 150);
        });

        function showTextSequentially() {
            let delay = 800; 
            
            fadeTexts.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('visible');
                    
                    if(index === fadeTexts.length - 1) {
                        setTimeout(startFireflies, 1000);
                    }
                }, delay);
                
                delay += 2500; 
            });
        }

        function startFireflies() {
            setInterval(() => {
                const firefly = document.createElement('div');
                firefly.classList.add('firefly');
                
                const startX = Math.random() * 100; 
                const size = Math.random() * 3 + 2; 
                const duration = Math.random() * 4 + 4; 
                
                firefly.style.left = `${startX}vw`;
                firefly.style.bottom = `-10px`;
                firefly.style.width = `${size}px`;
                firefly.style.height = `${size}px`;
                firefly.style.animation = `floatUp ${duration}s ease-in forwards`;
                
                firefly.style.marginLeft = `${(Math.random() - 0.5) * 50}px`;

                document.body.appendChild(firefly);

                setTimeout(() => {
                    firefly.remove();
                }, duration * 1000);
            }, 400); 
        }
    </script>
</body>
</html>
